<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduTrack — Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #0a2540 0%,
          #1155a8 60%,
          #1a6fd4 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .login-card {
        background: #fff;
        border-radius: 20px;
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .login-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
      }
      .et-logo {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #1155a8, #42a5f5);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .brand-name {
        font-size: 1.4rem;
        font-weight: 700;
        color: #0a2540;
        letter-spacing: -0.4px;
      }
      .brand-sub {
        font-size: 0.75rem;
        color: #64748b;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #0a2540;
        margin-bottom: 6px;
      }
      .subtitle {
        font-size: 0.85rem;
        color: #64748b;
        margin-bottom: 28px;
      }
      .field {
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #334155;
        margin-bottom: 6px;
        letter-spacing: 0.02em;
      }
      input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 0.88rem;
        font-family: inherit;
        color: #1e293b;
        outline: none;
        transition: 0.18s;
      }
      input:focus {
        border-color: #1a6fd4;
        box-shadow: 0 0 0 3px rgba(26, 111, 212, 0.12);
      }
      .btn-login {
        width: 100%;
        padding: 12px;
        background: #1a6fd4;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.92rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.18s;
        margin-top: 6px;
        font-family: inherit;
      }
      .btn-login:hover {
        background: #1155a8;
      }
      .btn-login:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .error-msg {
        background: #fee2e2;
        color: #dc2626;
        border-radius: 7px;
        padding: 10px 14px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 16px;
        display: none;
      }
      .error-msg.show {
        display: block;
      }
      .demo-accounts {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
      }
      .demo-title {
        font-size: 0.72rem;
        font-weight: 700;
        color: #94a3b8;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .demo-btn {
        width: 100%;
        padding: 9px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 7px;
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        background: #f8fafc;
        color: #334155;
        transition: 0.15s;
        font-family: inherit;
        margin-bottom: 7px;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .demo-btn:hover {
        border-color: #1a6fd4;
        color: #1a6fd4;
        background: #f0f7ff;
      }
      .demo-badge {
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 0.65rem;
        font-weight: 700;
        margin-left: auto;
      }
      .demo-badge.teacher {
        background: #e3f2fd;
        color: #1155a8;
      }
      .demo-badge.adviser {
        background: #ede9fe;
        color: #6d28d9;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-logo">
        <div class="et-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path
              d="M12 2C8.68 2 6 4.68 6 8c0 5 6 12 6 12s6-7 6-12c0-3.32-2.68-6-6-6z"
              fill="white"
              opacity=".9"
            />
            <circle cx="12" cy="8" r="2" fill="#1155a8" />
            <path d="M4 17h7v2H4zM13 17h7v2h-7z" fill="white" opacity=".6" />
          </svg>
        </div>
        <div>
          <div class="brand-name">EduTrack</div>
          <div class="brand-sub">Reyes Computer Oriented School</div>
        </div>
      </div>
      <h1>Welcome back 👋</h1>
      <div class="subtitle">Sign in to the Academic Oversight Portal</div>
      <div class="error-msg" id="errorMsg"></div>
      <div class="field">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="your@rcos.edu.ph"
          autocomplete="email"
        />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">
        Sign In
      </button>
      <div class="demo-accounts">
        <div class="demo-title">Quick Demo Login</div>
        <button class="demo-btn" onclick="fillDemo('ana.reyes@rcos.edu.ph')">
          <span>👩‍🏫</span> Mrs. Ana Reyes (Math Teacher)
          <span class="demo-badge teacher">Teacher</span>
        </button>
        <button
          class="demo-btn"
          onclick="fillDemo('carlos.bautista@rcos.edu.ph')"
        >
          <span>👨‍🏫</span> Mr. Carlos Bautista
          <span class="demo-badge adviser">Class Adviser</span>
        </button>
        <button class="demo-btn" onclick="fillDemo('jose.cruz@rcos.edu.ph')">
          <span>👨‍🏫</span> Mr. Jose Cruz (Science)
          <span class="demo-badge teacher">Teacher</span>
        </button>
      </div>
    </div>
    <script>
      const DEMO = {
        "ana.reyes@rcos.edu.ph": {
          teacher_id: 1,
          name: "Mrs. Ana Reyes",
          initials: "AR",
          role: "Subject Teacher",
          section_id: null,
        },
        "carlos.bautista@rcos.edu.ph": {
          teacher_id: 2,
          name: "Mr. Carlos Bautista",
          initials: "CB",
          role: "Class Adviser",
          section_id: 1,
        },
        "jose.cruz@rcos.edu.ph": {
          teacher_id: 3,
          name: "Mr. Jose Cruz",
          initials: "JC",
          role: "Subject Teacher",
          section_id: null,
        },
      };
      function fillDemo(email) {
        document.getElementById("email").value = email;
        document.getElementById("password").value = "password123";
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
      function doLogin() {
        const btn = document.getElementById("loginBtn");
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value.trim();
        if (!email || !pass) {
          showError("Please enter your email and password.");
          return;
        }
        btn.disabled = true;
        btn.textContent = "Signing in…";
        document.getElementById("errorMsg").classList.remove("show");
        setTimeout(() => {
          if (pass === "password123" && DEMO[email]) {
            sessionStorage.setItem(
              "edutrack_user",
              JSON.stringify({ ...DEMO[email], email }),
            );
            window.location.href = "EduTrack_Front.html";
          } else {
            showError("Invalid credentials. Try the demo buttons above.");
            btn.disabled = false;
            btn.textContent = "Sign In";
          }
        }, 700);
      }
      function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.classList.add("show");
      }
    </script>
  </body>
</html>
